<h2>노드 버튼 → 사이드 드로어 패턴</h2>
<p class="subtitle">이런 흐름으로 동작합니다. 맞으면 선택해주세요.</p>

<div class="mockup">
  <div class="mockup-header">Mind Map 화면 (기본 상태)</div>
  <div class="mockup-body" style="display:flex;height:220px;gap:0;position:relative;overflow:hidden">
    <!-- Canvas -->
    <div style="flex:1;background:#0f172a;position:relative;padding:20px">
      <!-- Root node -->
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#6366f1;border-radius:8px;padding:8px 16px;color:white;font-size:13px;font-weight:600;white-space:nowrap">
        📌 루트 노드
      </div>
      <!-- Child node with button highlighted -->
      <div style="position:absolute;top:30%;left:65%;background:#1e293b;border:1px solid #334155;border-radius:6px;padding:6px 10px;color:#e2e8f0;font-size:12px;display:flex;align-items:center;gap:6px;white-space:nowrap">
        🔵 키워드 A
        <span style="background:#6366f1;color:white;border-radius:3px;padding:1px 5px;font-size:10px;cursor:pointer">📝</span>
      </div>
      <!-- Line from root to child -->
      <svg style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none">
        <line x1="50%" y1="50%" x2="65%" y2="30%" stroke="#334155" stroke-width="1.5"/>
        <line x1="50%" y1="50%" x2="65%" y2="70%" stroke="#334155" stroke-width="1.5"/>
      </svg>
      <div style="position:absolute;top:68%;left:65%;background:#1e293b;border:1px solid #334155;border-radius:6px;padding:6px 10px;color:#e2e8f0;font-size:12px;display:flex;align-items:center;gap:6px;white-space:nowrap">
        🔵 키워드 B
        <span style="background:#334155;color:#94a3b8;border-radius:3px;padding:1px 5px;font-size:10px">📝</span>
      </div>
    </div>
    <!-- Note panel slides in from right -->
    <div style="width:240px;background:#1e293b;border-left:1px solid #6366f1;padding:14px;display:flex;flex-direction:column;gap:8px">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span style="color:#818cf8;font-size:12px;font-weight:600">📝 키워드 A — 노트</span>
        <span style="color:#64748b;font-size:11px;cursor:pointer">✕</span>
      </div>
      <div style="background:#0f172a;border-radius:4px;padding:8px;color:#94a3b8;font-size:11px;font-family:monospace;line-height:1.6;flex:1">
        <span style="color:#60a5fa">## 키워드 A</span><br/>
        여기에 관련 내용을<br/>
        마크다운으로 작성...<br/><br/>
        <span style="color:#4ade80">- 항목 1</span><br/>
        <span style="color:#4ade80">- 항목 2</span>
      </div>
      <div style="display:flex;gap:6px">
        <div style="flex:1;background:#6366f1;border-radius:4px;padding:4px;text-align:center;color:white;font-size:10px">저장</div>
        <div style="flex:1;background:#334155;border-radius:4px;padding:4px;text-align:center;color:#94a3b8;font-size:10px">닫기</div>
      </div>
    </div>
  </div>
</div>

<div style="margin-top:16px" class="options">
  <div class="option" data-choice="approve" onclick="toggleSelect(this)">
    <div class="letter">✓</div>
    <div class="content">
      <h3>이 방식으로 진행</h3>
      <p>노드의 📝 버튼 클릭 → 오른쪽에서 마크다운 에디터 패널이 슬라이드 인</p>
    </div>
  </div>
  <div class="option" data-choice="adjust" onclick="toggleSelect(this)">
    <div class="letter">✎</div>
    <div class="content">
      <h3>조금 다르게 수정</h3>
      <p>버튼 위치나 패널 동작을 다르게 하고 싶음</p>
    </div>
  </div>
</div>
