<h2>MVP에서 가장 중요한 핵심 기능은?</h2>
<p class="subtitle">XMind/EdrawMind 대비 "이것만큼은 꼭" 있어야 하는 기능을 고르세요 (복수 선택 가능)</p>

<div class="options" data-multiselect>
  <div class="option" data-choice="edit" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>노드 생성·편집·삭제</h3>
      <p>더블클릭으로 텍스트 편집, Tab으로 자식 노드 추가, Delete로 삭제</p>
    </div>
  </div>
  <div class="option" data-choice="layout" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>자동 레이아웃</h3>
      <p>노드 추가 시 자동으로 위치 정렬 (방사형, 트리형 등)</p>
    </div>
  </div>
  <div class="option" data-choice="style" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>스타일링 (색상·폰트·아이콘)</h3>
      <p>노드별 색상 변경, 폰트 크기, 이모지/아이콘 삽입</p>
    </div>
  </div>
  <div class="option" data-choice="save" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>저장·내보내기 (JSON/PNG/SVG)</h3>
      <p>로컬 파일로 저장하고 이미지로 내보내기</p>
    </div>
  </div>
</div>
