<h2>UI 레이아웃 방향</h2>
<p class="subtitle">어떤 화면 구성이 작업 흐름에 맞나요?</p>

<div class="options">
  <div class="option" data-choice="sidebar-right" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>캔버스 왼쪽 · 노트 패널 오른쪽</h3>
      <p>마인드맵 클릭 → 오른쪽에 마크다운 편집기 펼침. XMind와 유사한 패턴.</p>
      <div class="mockup" style="margin-top:8px">
        <div class="mockup-body" style="display:flex;gap:4px;height:80px;font-size:11px">
          <div style="flex:3;background:#1e293b;border-radius:4px;display:flex;align-items:center;justify-content:center;color:#94a3b8">🗺 마인드맵 캔버스</div>
          <div style="flex:2;background:#0f172a;border-radius:4px;display:flex;align-items:center;justify-content:center;color:#64748b;border:1px dashed #334155">📝 노트 패널</div>
        </div>
      </div>
    </div>
  </div>
  <div class="option" data-choice="bottom-panel" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>캔버스 위 · 노트 패널 아래</h3>
      <p>Notion 같은 "문서 아래 연결" 느낌. 넓은 캔버스 확보.</p>
      <div class="mockup" style="margin-top:8px">
        <div class="mockup-body" style="display:flex;flex-direction:column;gap:4px;height:80px;font-size:11px">
          <div style="flex:2;background:#1e293b;border-radius:4px;display:flex;align-items:center;justify-content:center;color:#94a3b8">🗺 마인드맵 캔버스</div>
          <div style="flex:1;background:#0f172a;border-radius:4px;display:flex;align-items:center;justify-content:center;color:#64748b;border:1px dashed #334155">📝 노트 패널</div>
        </div>
      </div>
    </div>
  </div>
  <div class="option" data-choice="modal" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>노드 더블클릭 → 풀스크린 노트 모달</h3>
      <p>캔버스를 최대한 확보. 노트 작성 시 집중 모드.</p>
      <div class="mockup" style="margin-top:8px">
        <div class="mockup-body" style="display:flex;gap:4px;height:80px;font-size:11px">
          <div style="flex:1;background:#1e293b;border-radius:4px;display:flex;align-items:center;justify-content:center;color:#94a3b8">🗺 캔버스 (전체)</div>
          <div style="position:relative;flex:0;width:0;overflow:visible">
            <div style="position:absolute;right:-40px;top:-10px;background:#0f172a;border:1px solid #6366f1;border-radius:4px;padding:4px 8px;font-size:10px;color:#818cf8;white-space:nowrap">📝 팝업 노트</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
